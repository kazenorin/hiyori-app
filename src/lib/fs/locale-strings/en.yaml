pipeline:
  headers:
    sceneSummaries: Scene Summaries
    characterSummaries: Character Summaries
    characterProfiles: Character Profiles
  extraction:
    gameMaster: Generate the game data based on the available information in the chat history.
    editor: Apply suggestions from the reviewer output to the writer output. Judge whether the suggestions are necessary based on the available information in the chat history.
    reviewer: "Perform a review on the writer's output for Scene {currentScene} based on the available information in the chat history."
    reviewerQuick: "Quick-review the writer's output for Scene {currentScene}. Skim for glaring errors only — output the review template immediately with no reasoning."
    writer: "Write a story prose for Scene {currentScene} based on the available information in the chat history."
    plotPlanner: "The current scene is Scene {currentScene}. Plan a Scene Plot for the Immediate Next Scene, Near-Term Beat (Flexible), and Mid-Term Goal (Flexible) based on the available information in the chat history."
    summarizerFallback: "Update the Act Summary for Scene {completedScenes} based on the Player Response."
    summarizer: "Update the Act Summary adding information for the previous scene: \"Scene {completedScenes}: {sceneTitle}\""
    editorTemplateFitter: >
      The "Editor Output" does not follow the required template format. Restructure it to match the Writer Output Template
      by inserting the appropriate section headers defined by "Writer Output Template" without changing any content.
      If the "Scene Title" section is missing from the content, generate a short, fitting title based on the narrative.
      If any other section is missing, add the header with no body.
    gmTemplateFitter: >
      The "Game Master Output" does not follow the required game data format. Restructure it to match the game data
      template by inserting the appropriate section headers defined by the "Game Data" template without changing any content.
      If a section is missing from the content, add the header with no body.
  system:
    templateFitter: >
      You are a template-fitting assistant. Your sole task is to restructure provided content into a specific markdown
      template format without altering any of the original content. Preserve every word — only add the required section headers.
  labels:
    upTo: up to
    acceptAsIs: accept as-is
    totalViolations: Total violations
    recommendation: Recommendation
    state: State
    goal: Goal
    relationships: Relationships
    voice: Voice
    characterSummaries: "Summaries of each character for recent Scenes since Scene {sceneNumber}."

features:
  characterCardGenerator:
    characterExtractionPrefix: |
      I need your help to extract all the characters from the current act.
      {transcriptStart}
    characterExtraction: "Extract all the characters from the current act according to the following rules: {rules}"
    characterCardGeneration: |
      Based on the information from the chat history, generate a new Character Card according to the following rules:
      {extractionPrompt}

      ---

      {template}
    transcriptStart: "The following messages will contain the transcript of the current act:"
    transcriptEnd: "The previous message was the end of the transcript of the current act."
    actCard: "The following message contains the Act Card from Act {actNumber}"
    characterCard: "The following message contains the previous Character Card of {characterName} from Act {actNumber}"
  actCardGenerator:
    transcriptStart: "The following messages will contain the transcript of the current act:"
    transcriptEnd: "The previous message was the end of the transcript of the current act. The following message will contain the Act Card template:"
    worldContext: "The world setting is based on the following:"
  worldBuilder:
    worldBuilderSeed: "I want to create a new story. Please help me build a world."
    resumeStoryActPrefix: |
      Continue the pre-game interview based on the latest story context below.

      The content represents what already happened. Use it only as context to understand the player's direction and preferences.

      Do NOT continue the story, narrate scenes, or generate plot content. Stay strictly in interview mode.

      ---
    resumeStoryActSuffix: |

      ---

      Resume the interview conversation naturally from here, helping the player refine what they want next.
  importWorld:
    labels:
      worldCard: "The following message is a world building settings card."
      actCard: "The following message is an act card describing the events of the act."
      characterCard: "The following message is a character card for {name}."
      characterNamePlaceholder: "a character in the story"
    instructions:
      actGeneration: |
        Generate a story based strictly on the settings and information provided above.
        Your top priorities are: (1) accuracy to source material, (2) consistency in character portrayal and tone, and (3) clear scene-based structure.

        Ensure all characters act and speak consistently with their established personalities, motivations, and relationships.
        Maintain the specified tone (e.g., gritty realism, whimsical fantasy, etc.) throughout the story.
        Present the story in prose format divided into clear scenes, not as a screenplay or dialogue script.

        You may introduce small original details only when necessary for flow or realism, and only if they support rather than alter the existing lore or character logic.

        Each scene should focus on one significant narrative event or emotional turning point.
        Scenes should be comparable in length and detail (roughly 300–500 words each), detailed enough to cover the event fully before moving on.
        Begin each scene with a short transition (except Scene 1) to connect it logically to the previous moment.
        End each scene with a sense of resolution or a hook leading into the next.

        IMPORTANT: Structure your response using markdown headers to separate distinct scenes.
        Use ## Scene, ### Scene X, or similar header levels to mark the beginning of each new scene.

        Example format:
        ## Scene 1: [Scene Title]
        [Story content...]

        ## Scene 2: [Scene Title]
        [Story content...]

        ## Scene 3: [Scene Title]
        [Story content...]

        Each scene should be a self-contained segment with a clear beginning and end.
      sceneExtractionFirst: |
        You will rewrite the following scene using the narration template provided below.
        Your primary goal is to **fit the scene into the given narration template and style**, preserving all essential content and character actions from the original scene.

        Apply the same narrative style, structure, and formatting conventions as shown in the template.
        Include vivid sensory descriptions, character dialogue, internal thoughts, and environment updates where appropriate for flow and immersion.
        Do not omit key story details or add new plot elements beyond what is needed for smooth narrative transitions and natural pacing.

        Present only the rewritten scene — do not include explanations, notes, or commentary outside the story output.

        ---NARRATION TEMPLATE---
        {narrationTemplate}

        ---SCENE CONTENT---
        {sceneContent}
      sceneExtractionContinuation: |
        Below are the previous scenes from this act for context:
        ---PREVIOUS SCENES---
        {previousScenes}

        You will rewrite the next scene using the narration template provided below.
        Your primary goal is to **apply the narration template faithfully while maintaining full consistency with the previous scenes** in tone, pacing, and style.

        Continue the story smoothly from where the previous scenes left off, ensuring logical continuity in plot, character actions, and emotional flow.
        Preserve all key content from the original scene; add only minor descriptive or connective details when necessary for realism or narrative cohesion.

        Apply the same narrative style, structure, and formatting conventions as the template.
        Do not restate previous scenes or summarize them — focus only on rewriting the current scene as part of the ongoing narrative.

        Present only the rewritten scene — do not include explanations, notes, or commentary outside the story output.

        ---NARRATION TEMPLATE---
        {narrationTemplate}

        ---SCENE CONTENT---
        {sceneContent}

tools:
  evaluateRisk:
    description: >
      Evaluates the outcome of taking a risk by rolling a dice. The higher the risk level, the more likely a bad outcome.
      Use this to determine whether a risky action succeeds, has a mixed result, or fails.
    parameters:
      riskLevel: "Level of risk taken (1 = lowest risk, 10 = highest risk)"
    messages:
      outcomeBad: "The risk resulted in a bad outcome."
      outcomeNeutral: "The risk resulted in a neutral outcome."
      outcomeGood: "The risk resulted in a good outcome."
  queryMemories:
    description: >
      Search the game's memory database to recall past events, locations visited, or character interactions.
      You must provide a character query, a time-location query for context, or both.
      Returns a list of recalled memories with their act number, recency, and location.
    parameters:
      characterQuery: >
        A short description of the character or topic to search memories for (e.g. "Elena", "the blacksmith").
        If omitted, the tool will return memories based on the time-location query context parameter.
      timeAndLocation: >
        A short description of the location or time period (e.g., "The Tavern", "Dawn in the Forest").
        If omitted, will return memories of the given character.
      currentActOnly: "If true, searches only recent memories from the current act. Set to false to retrieve long-term lore or events from past acts."
  queryInventory:
    description: |
      Check what a character currently has in their inventory. Returns items, equipment, skills, clothing, and status effects with equip status (equipped/wielded vs carried/owned).

      IMPORTANT: Only inventory changes that occur DURING the story are tracked. Items a character possessed before the story began will NOT appear in inventory unless they are explicitly mentioned in a scene. You should use your judgment to infer pre-existing possessions when appropriate (e.g., a knight likely has armor even if not explicitly mentioned, a wizard likely knows basic spells).

      Use this tool before describing a character using an item or ability to ensure consistency.

      Set includeHistory to true to also see the log of inventory change events (acquired, lost, equipped, unequipped, used, modified) for the character.
    parameters:
      characterName: "The character's name (canonical name or alias)"
      itemCategory: "Optional filter to return only one category"
      includeHistory: "If true, also return the inventory change event history for this character"
  readActPlot:
    description: >
      Read the act plot document for the current act. The act plot contains the story's planned structure: premise,
      target session count, major climactic events, possible endings, storytelling style, and presentation notes.
      Use this to understand the planned narrative arc and guide the story accordingly.
    messages:
      noActPlot: "No act plot has been generated for this act yet."
  advancePhase:
    description: >
      Advance the story to the next narrative phase (e.g., introduction → rising-action → climax → falling-action → resolution).
      This signals a major shift in the story's arc. Takes effect starting next turn.
      Can only be used once per scene. Cannot be used once the story has reached the resolution phase.
    messages:
      alreadyAdvanced: "Phase has already been advanced this scene. It will take effect next turn."
      success: "Phase advanced from {current} to {next}. Takes effect next turn."
      terminalPhase: "Cannot advance further — the story is already at the resolution phase."
  readScene:
    description: >
      Read the content of a specific scene in the current act. Returns the narrative body (assistant response) and
      the player response for the given scene number, formatted in Markdown.
    headers:
      sceneBody: Scene Body
      playerResponse: Player Response
    messages:
      noSceneFound: "No scene found with scene number {sceneNumber}."
      sceneNoContent: "Scene {sceneNumber} exists but contains no readable content."
    parameters:
      sceneNumber: "The scene number to read (1-based)"
