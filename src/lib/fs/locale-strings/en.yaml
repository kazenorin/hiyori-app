pipeline:
  headers:
    sceneSummaries: Scene Summaries
    characterSummaries: Character Summaries
    characterProfiles: Character Profiles
  extraction:
    gameMaster: Generate the game data based on the available information in the chat history.
    gmPhaseEventPhaseAdvancementTrigger: '- **Determine Act Phase**: If you believe the story has completed the {actPhase} Phase, use the `advance-phase` tool exactly once to move the story forward.'
    gmActEndTrigger: >
      - **Determine Act Conclusion**: If you believe the story has reached one of the Possible Endings defined in the
      Act Plot, where the central conflict is resolved and the narrative reaches a natural stopping point, use the
      `end-act` tool exactly once to signal the act's conclusion. Specify the `endingType` that best matches the
      player's choices (good, bad, bittersweet, or alternative).
    editor: Apply suggestions from the reviewer output to the writer output. Judge whether the suggestions are necessary based on the available information in the chat history.
    reviewer: "Perform a review on the writer's output for Scene {currentScene} based on the available information in the chat history."
    reviewerQuick: "Quick-review the writer's output for Scene {currentScene}. Skim for glaring errors only — output the review template immediately with no reasoning."
    writer:
      providedSummary: "\n- the summary of events up to Scene {summarizedScenes}"
      providedTurnOfEvents: "\n- the Turn Of Events instructions"
      turnOfEventsReinforcementPhrase: "\nYou must also consider the Turn Of Events that may drive the story to a different direction."
      providedDirectorNotes: "\n- the Director's Notes"
      directorNotesReinforcementPhrase: '**Important**: The Director has given directions for the upcoming scene. You **MUST** consider it when writing, and follow the directions or instructions given.'
      actEndPhaseEvent: >
        If you believe the story has reached a natural conclusion aligned with one of the Possible Endings defined
        in the Act Plot, use the `end-act` tool **exactly once** to signal the act's conclusion. When calling
        `end-act`, specify the `endingType` that best matches the player's choices and the narrative trajectory
        (good, bad, bittersweet, or alternative).

        When ending the act, write a **closing scene** that brings the narrative to a satisfying conclusion matching
        the chosen ending, resolves the central conflict, reflects the consequences of the player's key choices,
        and provides emotional closure. Do NOT introduce new plot threads or cliffhangers.
      actEndGuidance: >
        If you believe the narrative has reached one of the Possible Endings described in the Act Plot — where
        the central conflict is resolved and the story reaches a natural stopping point — use the `end-act` tool
        **exactly once** to signal the act's conclusion. When calling `end-act`, specify the `endingType` that best
        matches the player's choices and the narrative trajectory (good, bad, bittersweet, or alternative).

        When ending the act, write a **closing scene** that brings the narrative to a satisfying conclusion matching
        the chosen ending, resolves the central conflict, reflects the consequences of the player's key choices,
        and provides emotional closure. Do NOT introduce new plot threads or cliffhangers.
      epilogue: >
        You are writing the **epilogue** for this story. The main narrative has concluded with a {endingType} ending.
        Use the World Setting, Act Plot, and Act Summary provided to you for context.
        Write a final epilogue scene that reflects on the protagonist's journey, shows the lasting consequences of
        the player's choices, depicts the world after the main conflict has been resolved, and provides a sense of
        finality and closure. Do NOT introduce new conflicts, plot threads, or cliffhangers. This is the end of the story.
    plotPlanner:
      guidance: 'The current scene is Scene {currentScene}. Plan a Scene Plot for the Immediate Next Scene, Near-Term Beat (Flexible), and Mid-Term Goal (Flexible) based on the available information in the chat history.'
      phaseEvent: 'The current story phase of the act is {currentActPhase}. Plan the "Phase Events" based on the available information in the chat history.'
    summarizerTranscriptStart: 'The following messages will contain the transcript of the story act:'
    summarizerTranscriptEnd: 'The previous message was the end of the transcript of the story act.'
    summarizerFull: 'Generate a complete Act Summary covering all scenes in the transcript.'
    summarizerFallback: 'Update the Act Summary for Scene {completedScenes} based on the Player Response.'
    summarizer: 'Update the Act Summary adding information for the previous scene: "Scene {completedScenes}: {sceneTitle}"'
    actPlotResumeNote: |
      ---

      ## Important Note

      This Act Line is restarted from Scene {sceneNumber}, plot and events that happened at or prior to Scene {sceneNumber} may be have a different plot, or written from another perspective.
    editorTemplateFitter: >
      The "Editor Output" does not follow the required template format. Restructure it to match the Writer Output Template
      by inserting the appropriate section headers defined by "Writer Output Template" without changing any content.
      If the "Scene Title" section is missing from the content, generate a short, fitting title based on the narrative.
      If any other section is missing, add the header with no body.
    gmTemplateFitter: >
      The "Game Master Output" does not follow the required game data format. Restructure it to match the game data
      template by inserting the appropriate section headers defined by the "Game Data" template without changing any content.
      If a section is missing from the content, add the header with no body.
  system:
    templateFitter: >
      You are a template-fitting assistant. Your sole task is to restructure provided content into a specific markdown
      template format without altering any of the original content. Preserve every word — only add the required section headers.
  labels:
    upTo: up to
    acceptAsIs: accept as-is
    totalViolations: Total violations
    recommendation: Recommendation
    state: State
    goal: Goal
    relationships: Relationships
    voice: Voice
    characterSummaries: 'Summaries of each character for recent Scenes since Scene {sceneNumber}.'
    actPhases:
      introduction: Introduction
      risingAction: Rising Action
      climax: Climax
      fallingAction: Falling Action
      resolution: Resolution

features:
  characterCardGenerator:
    coreIdentity: Core Identity
    characterExtraction:
      systemPrompt: |
        You are a co-writer for an interactive narrative game, specializing in analyzing story content and identifying characters.
        You exist entirely outside the game world.
        Your responsibility is to extract all characters from the provided act transcript and assess their importance to the act.

        ## Rules

        - **Strict Canon:** Base your extraction entirely on the provided transcript. Do not invent characters not present in the text.
        - **Completeness:** Include every named character that appears, speaks, or is referenced.
        - **Include Referenced Characters:** Include characters mentioned by others even if they don't appear directly.
        - **Exclude Generics:** Exclude generic references (e.g., "the guard", "a soldier") unless they have a specific name.
        - **Assess Importance:** The "importance" field should briefly explain what role this character plays in this specific act.
      prefix: |
        I need your help to extract all the characters from the current act.
        {transcriptStart}
      extractionPrompt: |
        Extract all the characters from the current act according to the following rules:

        # Character Extraction

        Analyze the provided act narrative content and identify all characters that appear or are referenced.

        ## Task

        Extract a JSON array of characters with their importance to this act.

        ## Rules

        1. Include every named character that appears, speaks, or is referenced in the narrative
        2. Include characters mentioned by others even if they don't appear directly
        3. Exclude generic references (e.g., "the guard", "a soldier") unless they have a specific name
        4. The "importance" field should briefly explain what role this character plays in this specific act

        ## Output Format

        Return ONLY a JSON array. No introductory text, no markdown formatting, just the raw JSON.

        Example output:

        ```json
        [
        	{ "character": "John Doe", "importance": "Protagonist who makes the key decision at the climax." },
        	{ "character": "Jane Smith", "importance": "Supporting character who provides critical information." },
        	{ "character": "The Merchant", "importance": "Minor character who sets up the initial conflict." }
        ]
        ```

        If no characters are found, return an empty array: `[]`
    cardGenerationSystemPrompt: |
      You are a co-writer for an interactive narrative game, specializing in constructing detailed Character Cards.
      You exist entirely outside the game world.
      Your responsibility is to analyze the provided source material and construct a Character Card for {characterName} that will be used as an active memory file to keep their personality, voice, and motivations consistent during future story generation.

      ## Rules

      - **Strict Canon:** Base your card entirely on the provided source text. Do not invent details not present or strongly implied.
      - **Target Focus:** Extract information only as it pertains to {characterName}. Do not summarize the plot or detail world-lore unless it directly explains this character's behavior or backstory.
      - **Handling Unknowns:** If a specific piece of information is not explicitly stated or strongly implied, write "Unknown".
      - **Marking Inferences:** If you deduce a trait or motive based on actions, preface that detail with [Inferred].
      - **Concise & Concrete:** Use bullet points and short, declarative sentences. Focus on actionable behavioral cues.
      - **Voice Capture:** For "Dialogue Examples", extract 2-3 exact quotes that best demonstrate their unique vocabulary, sentence structure, and tone. If no dialogue, write "No dialogue provided."
    characterCardGeneration: |
      Based on the information from the chat history, generate a new Character Card according to the following rules:
      {extractionPrompt}

      ---

      {template}
    transcriptStart: 'The following messages will contain the transcript of the current act:'
    transcriptEnd: 'The previous message was the end of the transcript of the current act.'
    actCard: 'The following message contains the Act Card from Act {actNumber}'
    characterCard: 'The following message contains the previous Character Card of {characterName} from Act {actNumber}'
  actCardGenerator:
    transcriptStart: 'The following messages will contain the transcript of the current act:'
    transcriptEnd: 'The previous message was the end of the transcript of the current act. The following message will contain the Act Card template:'
    worldContext: 'The world setting is based on the following:'
    systemPrompt: |
      You are a co-writer for an interactive narrative game, specializing in analyzing story content and producing structured Act Cards.
      You exist entirely outside the game world.
      Your responsibility is to extract and organize narrative information from the provided transcript into the Act Card template.

      ## Instructions

      1. **Analyze Inputs:** Review the world setting (if provided), the act transcript, and the Act Card template.
      2. **Extract Facts:** Identify key events, characters, conflicts, emotional arcs, and revelations from the transcript.
      3. **Fill Template:** Populate every field of the Act Card template based on the extracted information.
      4. **Mark Uncertainty:** Preface uncertain conclusions with **Inferred:**. Use **Unknown** when evidence is missing entirely.

      ## Rules

      - **Strict Canon:** Base your extraction entirely on the provided source text. Do not invent events, characters, or interactions not present in the transcript.
      - **No World Lore Duplication:** Do not repeat information already covered by the World Card unless it directly affects this act.
      - **Operational Focus:** Keep each field concise, specific, and useful for future story generation.
      - **Cause-and-Effect:** For event breakdowns, focus on cause-and-effect, not just summaries.
      - **Preserve Tension:** Preserve unresolved tensions, pending reveals, and escalation structure.

      ## Output Format

      Respond ONLY with the filled-out Act Card template. Do not include introductory or concluding conversational text.
    extractionPrompt: |
      # Extraction Instructions

      Fill the provided Act Card template using the source from the chat history.

      Rules:

      - Prefer explicit facts over interpretation.
      - Mark uncertain conclusions as **Inferred:**.
      - Use **Unknown** when evidence is missing.
      - Do not repeat world lore already covered by the World Card unless it directly affects this plot or act.
      - Keep each field concise, specific, and operational for future story generation.
      - For chapter or event breakdowns, focus on cause-and-effect, not just summaries.
      - Preserve unresolved tensions, pending reveals, and escalation structure.
  worldBuilder:
    worldBuilderSeed: 'I want to create a new story. Please help me build a world.'
    resumeStoryActPrefix: |
      Continue the pre-game interview based on the latest story context below.

      The content represents what already happened. Use it only as context to understand the player's direction and preferences.

      Do NOT continue the story, narrate scenes, or generate plot content. Stay strictly in interview mode.

      ---
    resumeStoryActSuffix: |

      ---

      Resume the interview conversation naturally from here, helping the player refine what they want next.
  interview:
    systemRole:
      preGame: |
        You are the Pre-Game Interviewer for an interactive storytelling game. Your sole objective is to brainstorm with the player to discover what kind of story they want to play. You collect information so the system can generate a plot; you DO NOT write the plot, generate game data, or narrate the story yourself.
      nextAct: |
        You are the Inter-Act Interviewer for an interactive storytelling game. The player has just completed an act and is about to begin the next one. Your objective is to brainstorm with the player about the direction of the next act — what carries forward, what changes, and where the story should go. You collect information so the system can generate a plot; you DO NOT write the plot, generate game data, or narrate the story yourself.
    previousActConclusion: |
      ## Previous Act Conclusion

      The previous act ended with a **{endingType}** ending.
      The player has chosen to continue the story into a new act.
    previousActPlotReference: |
      ## Previous Act Plot (for reference)
  importWorld:
    messages:
      importCompleteWithInterview: 'Import complete! Starting interview...'
      importComplete: 'Import complete!'
      importCompletedSuccessfully: 'Import completed successfully.'
      importFailed: 'Import failed'
      processingAct: 'Processing Act {actNumber}...'
      detectingGameData: 'Detecting game data for {count} messages...'
      generatingGameData: 'Generating GameData[{index}]...'
      fillingNarrativeVariables: 'Filling narrative variables for {count} messages...'
      fillingNarrativeVariable: 'Filling narrative variables[{index}]...'
    validations:
      actTranscriptRequired: 'Act {actNumber} must have a transcript. Only the last act may be created without one.'
      actTranscriptRequiredSingle: 'Each act must have a transcript except the last one.'
      lastActRequiresContent: 'The last act without a transcript requires at least a world file, act file, or character card to proceed.'
      fileTooLarge: '{field} too large ({size}MB). Maximum is {max}MB.'
      contentRequired: 'At least a world building file, an act, or a character must be provided.'
      retryCountRange: 'LLM Retry Count must be between 0 and 20.'
      backoffIntervalRange: 'Backoff Interval must be between 1 and 60 seconds.'
      fileMustBeMdOrTxt: '{field} must be a .md or .txt file.'
      fileMustBeJson: 'Transcript file must be a .json file.'
      storyNameEmpty: 'Story name is empty — a placeholder name will be auto-generated.'
      actNameEmpty: 'Act {actNumber} name is empty — a placeholder name will be auto-generated.'
      characterCardMissing: 'Character card file is missing — character will be skipped during import.'
      characterNameEmpty: 'Character name is empty — a name will be derived from the card content.'
    description:
      unnamedCharacter: 'a character in the story'

tools:
  evaluateRisk:
    description: >
      Evaluates the outcome of taking a risk by rolling a dice. The higher the risk level, the more likely a bad outcome.
      Use this to determine whether a risky action succeeds, has a mixed result, or fails.
    parameters:
      riskLevel: 'Level of risk taken (1 = lowest risk, 10 = highest risk)'
    messages:
      outcomeBad: 'The risk resulted in a bad outcome.'
      outcomeNeutral: 'The risk resulted in a neutral outcome.'
      outcomeGood: 'The risk resulted in a good outcome.'
  queryMemories:
    description: >
      Search the game's memory database to recall past events, locations visited, or character interactions.
      You must provide a character query, a time-location query for context, or both.
      Returns a list of recalled memories with their act number, recency, and location.
    parameters:
      characterQuery: >
        A short description of the character or topic to search memories for (e.g. "Elena", "the blacksmith").
        If omitted, the tool will return memories based on the time-location query context parameter.
      timeAndLocation: >
        A short description of the location or time period (e.g., "The Tavern", "Dawn in the Forest").
        If omitted, will return memories of the given character.
      currentActOnly: 'If true, searches only recent memories from the current act. Set to false to retrieve long-term lore or events from past acts.'
  queryInventory:
    description: |
      Check what a character currently has in their inventory. Returns items, equipment, skills, clothing, and status effects with equip status (equipped/wielded vs carried/owned).

      IMPORTANT: Only inventory changes that occur DURING the story are tracked. Items a character possessed before the story began will NOT appear in inventory unless they are explicitly mentioned in a scene. You should use your judgment to infer pre-existing possessions when appropriate (e.g., a knight likely has armor even if not explicitly mentioned, a wizard likely knows basic spells).

      Use this tool before describing a character using an item or ability to ensure consistency.

      Set includeHistory to true to also see the log of inventory change events (acquired, lost, equipped, unequipped, used, modified) for the character.
    parameters:
      characterName: "The character's name (canonical name or alias)"
      itemCategory: 'Optional filter to return only one category'
      includeHistory: 'If true, also return the inventory change event history for this character'
  readActPlot:
    description: >
      Read the act plot document for the current act. The act plot contains the story's planned structure: premise,
      target session count, major climactic events, possible endings, storytelling style, and presentation notes.
      Use this to understand the planned narrative arc and guide the story accordingly.
    messages:
      noActPlot: 'No act plot has been generated for this act yet.'
  advancePhase:
    description: >
      Advance the story to the next narrative phase (e.g., {introduction} → {risingAction} → {climax} → {fallingAction} → {resolution}).
      This signals a major shift in the story's arc. Takes effect starting next turn.
      Can only be used once per scene. Cannot be used once the story has reached the resolution phase.
    messages:
      alreadyAdvanced: 'Phase has already been advanced this scene. It will take effect next turn.'
      success: 'Phase advanced from {current} to {next}. Takes effect next turn.'
      terminalPhase: 'Cannot advance further — the story is already at the resolution phase.'
  endAct:
    description: >
      End the current act. Call this when the narrative has reached a natural conclusion aligned with
      one of the Possible Endings defined in the Act Plot. Specify which ending the story has reached:
      {good}, {bad}, {bittersweet}, or {alternative}.
    endingGood: Good
    endingBad: Bad
    endingBittersweet: Bittersweet
    endingAlternative: Alternative
    alreadyEnded: 'The current act has already ended.'
    tooEarly: >
      The story has not reached a point where ending the act is appropriate.
      The narrative needs to progress further before a natural conclusion can be reached.
    success: 'The act has concluded with a {endingType} ending. Write a closing scene that brings the narrative to a satisfying conclusion.'
  readScene:
    description: >
      Read the content of a specific scene in the current act. Returns the narrative body (assistant response) and
      the player response for the given scene number, formatted in Markdown.
    headers:
      sceneBody: Scene Body
      playerResponse: Player Response
    messages:
      noSceneFound: 'No scene found with scene number {sceneNumber}.'
      sceneNoContent: 'Scene {sceneNumber} exists but contains no readable content.'
    parameters:
      sceneNumber: 'The scene number to read (1-based)'
