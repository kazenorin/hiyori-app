      unnamedCharacter: '故事中的某個角色'
  worldGenerator:
    fromChatSystemPrompt: '你是一個世界觀建構分析師。你的任務是閱讀用戶與 AI 故事講述者之間的聊天記錄，提取底層的世界觀建構元素，並生成一份捕捉世界觀設定的結構化 Markdown 文件。著重於宏觀設定: 地理、勢力、魔法/科技體系、種族和整體主題。忽略具體劇情事件、個別角色弧線和章節性細節。僅輸出 Markdown 內容——不加評論。'
    fromChatPrompt: |
      分析我們的聊天記錄，並使用下方的 Markdown 範本生成一份完整的世界觀設定文件。

      **規則:**

      1. 所有資訊必須嚴格基於提供的聊天記錄。若記錄需要，你可以添加或省略範本區段。
      2. 著重於宏觀的世界觀建構和整體設定。不要包含具體的劇情要點、時間線或章節性故事細節。
      3. 排除角色簡介，除非該角色有巨大的、改變世界的影響 (例如統治君主、神祇) 。
      4. 僅輸出原始 Markdown 文字。不要在 Markdown 區塊前後包含對話式填充、問候或格式說明。

      ---
    fromCardsSystemPrompt: '你是一個世界觀建構分析師。你的任務是閱讀提供的世界觀設定、章節描述和角色資訊，然後綜合生成一份捕捉世界觀設定的結構化 Markdown 文件。著重於宏觀設定: 地理、勢力、魔法/科技體系、種族和整體主題。根據提供的素材進行推斷——若細節稀少，可做出與既有內容一致的合理推推測。僅輸出 Markdown 內容——不加評論。'
    fromCardsPrompt: |
      分析提供的世界觀設定、章節描述和角色資訊，並使用下方的 Markdown 範本生成一份完整的世界觀設定文件。

      **規則:**

      1. 所有資訊必須基於提供的素材。為了建構連貫的世界觀，你可以在必要時推斷或添加細節，但必須與既有內容保持一致。
      2. 著重於宏觀的世界觀建構和整體設定。不要包含具體的劇情時間線或章節性故事細節，除非它們定義了世界本身。
      3. 排除個別角色簡介，除非該角色有巨大的、改變世界的影響 (例如統治君主、神祇) 。角色特質應用於形塑世界觀的基調和主題，而非作為獨立條目出現。
      4. 僅輸出原始 Markdown 文字。不要在 Markdown 區塊前後包含對話式填充、問候或格式說明。

      ---
  worldUpdater:
    fromActSystemPrompt: '你是一個世界建構分析師。你的任務是根據已完成的故事章節和關於下一章節的訪談中的新資訊，更新現有的世界設定文件。你必須更新文件，而非重寫——保留現有結構，專注於較不固定、更具變動性的部分，同時保持邏輯一致性。將章節摘要和訪談中反映世界變化的元素納入考量。此次更新的目的是擴展世界設定，以便根據擴展後的世界撰寫續篇。僅輸出更新後的 Markdown 內容——不加評論。'
    fromActPrompt: |
      根據上方提供的資訊，更新現有的世界設定文件。

      **規則: **

      1. 這是**更新**，而非重寫。保留現有結構、標題和已建立的背景設定。僅在已完成章節或訪談中的新資訊引入變更或擴展時，修改相應章節。
      2. 專注於**較不固定、更具變動性的部分**——政治變動、新發現的地點、派系動態的變化、科技或魔法發展。與已建立的設定保持邏輯一致性。
      3. 將章節摘要和訪談中反映世界變化的元素納入考量。如果訪談指出下一章節的新方向，則相應擴展世界設定。
      4. 此次更新的目的是根據擴展後的世界**撰寫續篇**。確保更新後的世界支援訪談中討論的敘事方向。
      5. 不要包含具體情節事件、角色弧線或章節性細節。僅提取世界層面的影響。
      6. 僅輸出更新後的原始 Markdown 文字。不要包含對話性填充或解釋。

      ---
  importantPhrases:
    systemPrompt: |
      僅從文本中擷取原句短語。

      約束:
      - 每行輸出必須逐字複製自同一句句子。
      - 絕不在同一行中包含來自多個句子的詞語。
      - 絕不改寫。
      - 絕不拼接來自文本不同部分的片段。
      - 僅回傳最重要的 5 項，若不足則更少。
      - 每項少於 10 個詞，優先選擇較短的短語。

      輸出:
      每行僅一個短語。

tools:
  selectWorldTemplate:
    description: >
      選擇最符合使用者故事想法的世界觀模板。
      當你對類型和設定有信心時呼叫此工具。
    parameters:
      templateId: '所選世界觀模板的 ID'
    messages:
      success: '已選擇模板: {{templateName}}。你現在可以使用此模板開始構建世界觀。'
      errors:
        alreadySelected: '此工作階段已選擇了模板。'
        invalidTemplateId: '無效的模板 ID。請從以下選擇: high-fantasy、modern-slice-of-life、sci-fi、urban-fantasy。'
  evaluateRisk:
    description: >
      透過擲骰來評估帶有風險的行動的結果。風險等級越高，壞結果的機率越大。
      用於判斷帶有風險的行動是成功、混合結果還是失敗。
    parameters:
      riskLevel: '冒險程度 (1 = 最低風險，10 = 最高風險) '
    messages:
      outcomeBad: '行動導致了壞結果。'
      outcomeNeutral: '行動導致了中性結果。'
      outcomeGood: '行動導致了好結果。'
  queryMemories:
    description: >
      搜尋遊戲的記憶資料庫，以喚回過去的事件、去過的地點或角色互動。
      你必須提供角色查詢、時間-地點查詢，或兩者兼備。
      回傳的記憶列表將包含章節編號、新近度和地點。
    parameters:
      characterQuery: >
        簡短描述要搜尋記憶的角色或主題 (例如「莉娜」、「鐵匠」) 。
        若省略，工具將根據時間-地點查詢參數回傳記憶。
      timeAndLocation: >
        簡短描述地點或時間 (例如「酒館」、「森林的清晨」) 。
        若省略，將回傳指定角色的記憶。
      currentActOnly: '若為 true，僅搜尋目前章節的近期記憶。設為 false 可擷取過往章節的長期設定或事件。'
  queryInventory:
    description: |
      查看角色目前物品欄中的內容。回傳物品、裝備、技能、服裝和狀態效果，並標示裝備狀態 (已裝備/已揮舞 vs 隨身攜帶/已擁有) 。

      重要: 僅追蹤故事進行中發生的物品欄變更。故事開始前角色已擁有的物品不會出現在物品欄中，除非在場景中明確提及。你應自行判斷推斷角色既有的物品 (例如騎士很可能有盔甲，即使未被明確提及; 法師很可能懂得基本法術) 。

      在描述角色使用物品或能力之前，請先使用此工具以確保一致性。

      設 includeHistory 為 true 可同時查看角色的物品欄變更事件記錄 (獲得、失去、裝備、卸下、使用、修改) 。
    parameters:
      characterName: '角色名稱 (正規名稱或別名) '
      itemCategory: '選填篩選條件，僅回傳指定類別'
      includeHistory: '若為 true，同時回傳物品欄變更事件歷史'
  readActPlot:
    description: >
      閱讀目前章節的章節劇情文件。章節劇情包含故事已規劃的結構: 前提、目標場景數、
      主要高潮事件、可能的結局、敘事風格和呈現備註。
      使用此工具來了解已規劃的敘事走向，並依此引導故事發展。
    messages:
      noActPlot: '此章節尚未生成章節劇情。'
  introduceCharacter:
    description: >
      透過在資料庫建立基準檔案來引入新角色。
      當沒有現有檔案的新角色登場時呼叫此工具。
      呼叫前請確認該角色並非已知名稱或別名下的既存角色 — 工具會拒絕重複項目。
    parameters:
      preferredName: '此章節路線中此角色的主要名稱。「不明」、「無」或「沒有」等的佔位名稱不應當作名稱。'
      aliases: '此章節路線中此角色已知的其他名稱或別名。「不明」、「無」或「沒有」等佔位名稱不應當作名稱或別名。'
      oneLineDescription: '用一個句子說明此角色是誰。'
      goal: '此角色於現場景的即時動機或驅動力。'
      relationships: '角色與其他活躍角色之間的當前關係簡述。'
      voice: '引述一句能代表此角色的說話。'
      importance: '1=主角, 2=主要角色, 3=配角, 4=次要角色'
    messages:
      exists: '此名稱或別名的角色已存在。請使用 `character-details` 工具取得現有檔案。'
  characterDetails:
    description: >
      透過角色的任何已知名稱或別名取得最新檔案。
      用於完整檔案尚未內嵌至脈絡中的角色（如配角和次要角色）。
      請勿對完整檔案已顯示於上方的角色呼叫此工具。
    parameters:
      name: '角色的任何已知名稱或別名'
      includeSceneDetails: '若為 true（預設），包含每場景詳情。若為 false，只回傳壓縮檔案。'
    messages:
      notFound: '此章節路線中找不到該名稱的角色檔案。'
    output:
      importance: '重要性: {{importance}}'
      aliases: '別名: {{aliases}}'
      lastUpdated: '最後更新: 場景 {{sceneNumber}}'
      sceneDetails: '場景詳情'
  advancePhase:
    description: >
      將故事推進至下一個敘事階段 (例如: {{introduction}} → {{risingAction}} → {{climax}} → {{fallingAction}} → {{resolution}}) 。
      你必須同時指定故事目前所處的階段以及要推進至的下一個階段。
      兩者必須與實際故事狀態相符——若不相符，工具將回傳錯誤訊息並顯示實際目前階段，且不會推進階段。
      此動作標誌著故事弧線的重大轉折，將於下一回合生效。
      每個場景只能使用一次。故事已達結局階段後無法再使用。
      此工具必須在推理期間呼叫，且必須在任何敘事輸出撰寫之前。若已撰寫任何輸出，請勿呼叫此工具。
    parameters:
      currentPhase: '故事目前所處的敘事階段。'
      nextPhase: '要推進至的下一個敘事階段。'
    messages:
      alreadyAdvanced: '此場景已推進過階段，將於下一回合生效。'
      success: '階段已從 {{current}} 推進至 {{next}}，將於下一回合生效。'
      terminalPhase: '無法再推進——故事已達結局階段。'
      phaseMismatch:
        current: '階段不符: 故事目前處於 {{actual}}，而非 {{provided}}。階段未推進。'
        next: '階段不符: 故事目前處於 {{actual}}，下一個階段為 {{expected}}，而非 {{provided}}。階段未推進。'
  endAct:
    endingTypeInstructions: >
      呼叫 `end-act` 時，請將 `endingType` 參數設為最符合敘事走向及玩家選擇的值: `good`(好結局)、`bad`(壞結局)、`bittersweet`(苦甜結局) 或 `alternative`(另類結局)。
    description: >
      結束目前章節。當敘事已達到與章節劇情中定義的可能結局之一相符的自然結論時，呼叫此工具。
      指定故事已達到的結局: {{good}}、{{bad}}、{{bittersweet}} 或 {{alternative}}。
      此工具必須在推理期間呼叫，且必須在任何敘事輸出撰寫之前。若已撰寫任何輸出，請勿呼叫此工具。
    endingGood: 好結局
    endingBad: 壞結局
    endingBittersweet: 苦甜結局
    endingAlternative: 另類結局
    alreadyEnded: '目前章節已經結束。'
    tooEarly: >
      故事尚未到達適合結束章節的階段。
      敘事需要進一步發展才能達到自然的結論。
    success: '章節已以 {{endingType}} 結局作結。請撰寫一個使敘事達到令人滿意結論的收尾場景。'
  readScene:
    description: >
      閱讀目前章節中所指定的場景的內容。回傳指定場景編號的敘事正文 (AI 回應) 和玩家回應，
      以 Markdown 格式呈現。
    headers:
      sceneBody: 場景正文
      playerResponse: 玩家回應
    messages:
      noSceneFound: '找不到場景編號為 {{sceneNumber}} 的場景。'
      sceneNoContent: '場景 {{sceneNumber}} 存在但不包含可讀取的內容。'
    parameters:
      sceneNumber: '要閱讀的場景編號 (從 1 開始) '
  readDistantScene:
    description: >
      閱讀先前章節中指定場景的內容。僅在需要回憶早期章節的遙遠記憶時使用此工具 — 對於目前章節的場景，
      請務必優先使用 read-scene 工具。回傳指定場景編號的敘事正文 (AI 回應) 和玩家回應，
      以 Markdown 格式呈現。目前章節為第 {{currentActNumber}} 章；您只能閱讀目前敘事線傳承中的章節。
    headers:
      sceneBody: 場景正文
      playerResponse: 玩家回應
    messages:
      futureAct: '無法閱讀尚未發生的章節。'
      actNotInLineage: '第 {{actNumber}} 章不在目前敘事線的傳承中。'
      noSceneFound: '第 {{actNumber}} 章中找不到場景編號為 {{sceneNumber}} 的場景。'
      sceneNoContent: '第 {{actNumber}} 章的場景 {{sceneNumber}} 存在但不包含可讀取的內容。'
    parameters:
      actNumber: '要閱讀的章節編號 (必須在目前章節線的傳承中)'
      sceneNumber: '要閱讀的場景編號 (從 1 開始)'
