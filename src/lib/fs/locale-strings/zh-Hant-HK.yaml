pipeline:
  headers:
    sceneSummaries: 場景摘要
    characterSummaries: 角色摘要
    characterProfiles: 角色檔案
  extraction:
    actShortSummary: '你是一個敘事摘要者。你的任務是將提供的章節摘要濃縮為精確的 3 個簡潔句子，捕捉章節的關的關鍵事件、衝突和結果。專注於發生了什麼以及故事如何改變。以過去式撰寫。在 3 個句子之後，空一行，然後評估章節摘要中列出的角色。僅列出你判斷為重要且可能在未來章節中再次出現的角色，每行格式為: 「名字（一句話描述其在此章節中的角色或弧線）」。按重要性由高到低排序。不要列出次要或僅出現一次的角色。僅輸出摘要和角色列表——不添加標籤、標題或評論。'
    actShortSummaryCharacterPrefix: '此章節中的角色'
    aliasFilter: |
      你是一個角色識別器。
      你現有一組 JSON 字串陣列。
      請回傳一組經篩選後、只包含角色識別名稱的 JSON 陣列。
      不要修改任何字串。
      只回傳 JSON 陣列。
    gameMaster: 根據聊天記錄中的可用資訊，生成遊戲資料。
    editor: 根據審閱者輸出的建議，修改寫手輸出。請根據聊天記錄中的可用資訊，判斷這些建議是否有必要採納。
    reviewer: '根據聊天記錄中的可用資訊，審閱寫手對場景 {{currentScene}} 的輸出。'
    reviewerQuick: '快速審閱寫手對場景 {{currentScene}} 的輸出。僅略讀明顯錯誤——立即輸出審閱範本，不附帶推理過程。'
    writer:
      providedSummary: "\n- 場景 {{summarizedScenes}} 以前的事件摘要"
      providedTurnOfEvents: "\n- 劇情轉折指令"
      turnOfEventsReinforcementPhrase: "\n你也必須考慮可能使故事轉向不同方向的劇情轉折。"
      providedDirectorNotes: "\n- 導演備註"
      directorNotesReinforcementPhrase: '**重要**: 導演已為即將到來的場景給出指示。你**必須**在撰寫時考慮，並遵循所給的方向或指示。'
      actEndPhaseEvent: >
        當故事達到與章節劇情中可能結局之一相符的自然結論時，請在推理期間呼叫 `end-act` 工具**精確一次**，且必須在撰寫收尾場景之前。
        {{endingTypeInstructions}}

        呼叫 `end-act` 之後，再將收尾場景作為你的敘事輸出撰寫。
        {{closingSceneRules}}
      actEndGuidance: >
        當敘事達到章節劇情中描述的可能結局之一——即核心衝突已解決且故事到達自然的停止點——請在推理期間呼叫 `end-act` 工具**精確一次**，且必須在撰寫收尾場景之前。
        {{endingTypeInstructions}}

        呼叫 `end-act` 之後，再將收尾場景作為你的敘事輸出撰寫。
        {{closingSceneRules}}
      closingSceneRules: >
        撰寫收尾場景時，請確保:
          - 使敘事達到與所選結局相符的令人滿意且情感共鳴的結論
          - 解決章節的核心衝突
          - 反映玩家在整個章節中關鍵選擇的後果
          - 提供情感上的收束，不引入新的劇情線索或懸念
      epilogue: >
        你正在為這個故事撰寫**尾聲**。主敘事已以 {{endingType}} 結局作結。請使用提供的世界觀設定、章節劇情和章節摘要作為參考。
        請撰寫最終的尾聲場景，回顧主角的旅程，展示玩家選擇的持久影響，描繪主要衝突解決後的世界，並提供完結感與收束。
        請勿引入新的衝突、劇情線索或懸念。這是故事的終結。
      guidanceExtraction: |
        你現在負責撰寫場景 {{currentScene}} 的故事散文，即即將到來的場景。你已獲得以下資訊:

        - 世界觀設定
        - 章節劇情 {{providedSummary}}
        - 即將到來場景的場景劇情
        - 上一場景 (場景 {{previousScene}}) 的完整敘事正文
        - 玩家對上一場景的回應 {{providedTurnOfEvents}}{{providedDirectorNotes}}

        你的工作是根據所提供的資訊，創作生動、引人入勝且沉浸式的敘事。
        你被指示優先發展場景劇情所引導的事件。 {{actEndInstruction}}{{turnOfEventsReinforcementPhrase}}
        使用場景劇情中的節奏決定。若編劇允許擴展字數，你可以寫到平常長度的兩倍。
        {{directorNotesReinforcementPhrase}}
      phaseEventExtraction: |
        你現在負責撰寫場景 {{currentScene}} 的故事散文，即即將到來的場景。你已獲得以下資訊:

        - 世界觀設定
        - 章節劇情
        - 目前的章節階段 ({{currentActPhase}}) 及其階段事件 {{providedSummary}}
        - 上一場景 (場景 {{previousScene}}) 的完整敘事正文
        - 玩家對上一場景的回應 {{providedTurnOfEvents}}{{providedDirectorNotes}}

        你的工作是根據所提供的資訊，創作生動、引人入勝且沉浸式的敘事。
        你需要評估目前的事件狀態，看看是否有階段事件可以被觸發或已經被觸發。
        對於已觸發但尚未詳細描述的事件，你被指示詳細闡述它們。
        若沒有事件被觸發，或所有已觸發的事件已有合理的闡述，請將故事推向最適合的下一個事件。
        若你認為故事的目前狀態已滿足 {{currentActPhase}} 階段的目標，請使用 `advance-phase` 工具**精確一次**來推進故事。 {{actEndInstruction}}{{turnOfEventsReinforcementPhrase}}
        {{directorNotesReinforcementPhrase}}
    plotPlanner:
      guidance: '目前場景為場景 {{currentScene}}。請根據聊天記錄中的可用資訊，為緊接的下一場景、近期的情節節奏 (可彈性處理) 以及中期目標 (可彈性處理) 規劃場景劇情。'
