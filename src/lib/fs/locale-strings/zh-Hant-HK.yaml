      importComplete: '匯入完成！'
      importCompletedSuccessfully: '匯入已成功完成。'
      importFailed: '匯入失敗'
      processingAct: '正在處理章節 {actNumber}...'
      detectingGameData: '正在偵測 {count} 則訊息的遊戲資料...'
      generatingGameData: '正在生成遊戲資料[{index}]...'
      fillingNarrativeVariables: '正在填入 {count} 則訊息的敘事變數...'
      fillingNarrativeVariable: '正在填入敘事變數[{index}]...'
    validations:
      actTranscriptRequired: '章節 {actNumber} 必須提供對話記錄。僅最後一個章節可以不提供。'
      actTranscriptRequiredSingle: '除最後一個章節外，每個章節都必須提供對話記錄。'
      lastActRequiresContent: '沒有對話記錄的最後一個章節，至少需要世界觀文件、章節文件或角色卡才能繼續。'
      fileTooLarge: '{field} 檔案過大 ({size}MB)。上限為 {max}MB。'
      contentRequired: '至少需要提供世界觀文件、一個章節或一個角色。'
      retryCountRange: 'LLM 重試次數必須介於 0 到 20 之間。'
      backoffIntervalRange: '退避間隔必須介於 1 到 60 秒之間。'
