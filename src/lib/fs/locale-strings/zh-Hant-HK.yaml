      fileMustBeJson: '對話記錄檔案必須是 .json 檔案。'
      storyNameEmpty: '故事名稱為空——將自動生成佔位名稱。'
      actNameEmpty: '章節 {actNumber} 名稱為空——將自動生成佔位名稱。'
      characterCardMissing: '角色卡檔案缺失——角色將在匯入時被跳過。'
      characterNameEmpty: '角色名稱為空——將從卡片內容推導名稱。'
    description:
      unnamedCharacter: '故事中的某個角色'

tools:
  evaluateRisk:
    description: >
      透過擲骰來評估帶有風險的行動的結果。風險等級越高，壞結果的機率越大。
      用於判斷帶有風險的行動是成功、混合結果還是失敗。
    parameters:
      riskLevel: '冒險程度 (1 = 最低風險，10 = 最高風險) '
    messages:
      outcomeBad: '行動導致了壞結果。'
      outcomeNeutral: '行動導致了中性結果。'
      outcomeGood: '行動導致了好結果。'
  queryMemories:
    description: >
      搜尋遊戲的記憶資料庫，以喚回過去的事件、去過的地點或角色互動。
      你必須提供角色查詢、時間-地點查詢，或兩者兼備。
      回傳的記憶列表將包含章節編號、新近度和地點。
    parameters:
      characterQuery: >
        簡短描述要搜尋記憶的角色或主題 (例如「莉娜」、「鐵匠」) 。
        若省略，工具將根據時間-地點查詢參數回傳記憶。
      timeAndLocation: >
        簡短描述地點或時間 (例如「酒館」、「森林的清晨」) 。
        若省略，將回傳指定角色的記憶。
      currentActOnly: '若為 true，僅搜尋目前章節的近期記憶。設為 false 可擷取過往章節的長期設定或事件。'
  queryInventory:
    description: |
      查看角色目前物品欄中的內容。回傳物品、裝備、技能、服裝和狀態效果，並標示裝備狀態 (已裝備/已揮舞 vs 隨身攜帶/已擁有) 。

      重要: 僅追蹤故事進行中發生的物品欄變更。故事開始前角色已擁有的物品不會出現在物品欄中，除非在場景中明確提及。你應自行判斷推斷角色既有的物品 (例如騎士很可能有盔甲，即使未被明確提及; 法師很可能懂得基本法術) 。

      在描述角色使用物品或能力之前，請先使用此工具以確保一致性。

      設 includeHistory 為 true 可同時查看角色的物品欄變更事件記錄 (獲得、失去、裝備、卸下、使用、修改) 。
    parameters:
      characterName: '角色名稱 (正規名稱或別名) '
      itemCategory: '選填篩選條件，僅回傳指定類別'
      includeHistory: '若為 true，同時回傳物品欄變更事件歷史'
  readActPlot:
    description: >
      閱讀目前章節的章節劇情文件。章節劇情包含故事已規劃的結構: 前提、目標場景數、
      主要高潮事件、可能的結局、敘事風格和呈現備註。
      使用此工具來了解已規劃的敘事走向，並依此引導故事發展。
    messages:
      noActPlot: '此章節尚未生成章節劇情。'
  advancePhase:
    description: >
      將故事推進至下一個敘事階段 (例如: {introduction} → {risingAction} → {climax} → {fallingAction} → {resolution}) 。
      此動作標誌著故事弧線的重大轉折，將於下一回合生效。
      每個場景只能使用一次。故事已達結局階段後無法再使用。
    messages:
      alreadyAdvanced: '此場景已推進過階段，將於下一回合生效。'
      success: '階段已從 {current} 推進至 {next}，將於下一回合生效。'
      terminalPhase: '無法再推進——故事已達結局階段。'
  endAct:
    description: >
      結束目前章節。當敘事已達到與章節劇情中定義的可能結局之一相符的自然結論時，呼叫此工具。
      指定故事已達到的結局: {good}、{bad}、{bittersweet} 或 {alternative}。
    endingGood: 好結局
    endingBad: 壞結局
    endingBittersweet: 苦甜結局
    endingAlternative: 另類結局
    alreadyEnded: '目前章節已經結束。'
    tooEarly: >
      故事尚未到達適合結束章節的階段。
      敘事需要進一步發展才能達到自然的結論。
    success: '章節已以 {endingType} 結局作結。請撰寫一個使敘事達到令人滿意結論的收尾場景。'
  readScene:
    description: >
      閱讀目前章節中所指定的場景的內容。回傳指定場景編號的敘事正文 (AI 回應) 和玩家回應，
      以 Markdown 格式呈現。
    headers:
      sceneBody: 場景正文
      playerResponse: 玩家回應
    messages:
      noSceneFound: '找不到場景編號為 {sceneNumber} 的場景。'
      sceneNoContent: '場景 {sceneNumber} 存在但不包含可讀取的內容。'
    parameters:
      sceneNumber: '要閱讀的場景編號 (從 1 開始) '
