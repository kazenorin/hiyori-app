features:
  characterCardGenerator:
    coreIdentity: 核心身份
    characterExtraction:
      systemPrompt: |
        你是一個互動敘事遊戲的共同作者，專精於分析故事內容並識別角色。
        你完全存在於遊戲世界之外。
        你的職責是從提供的章節文本記錄中擷取所有角色，並評估他們在此章節中的重要性。

        ## 規則

        - **嚴格遵循原文：** 完全根據提供的文本記錄提取。不得捏造文本中未出現的角色。
        - **完整性：** 包含每個出現、發言或被提及的具名角色。
        - **包含被提及角色：** 包含被其他角色提及但未直接出現的角色。
        - **排除泛稱：** 排除泛稱引用（如「守衛」、「士兵」），除非他們有具體名字。
        - **評估重要性：** 「重要性」欄位應簡要說明此角色在此章節中扮演的角色。
      prefix: |
        我需要你協助從目前的章節中擷取所有角色。
        {transcriptStart}
      extractionPrompt: |
        根據以下規則，從目前的章節中擷取所有角色:

        # 角色擷取

        分析提供的章節敘事內容，識別所有出現或被提及的角色。

        ## 任務

        擷取一個 JSON 陣列，包含角色及其在本章節中的重要性。

        ## 規則

        1. 包含敘事中每個具名的、出現的、說話的或被提及的角色
        2. 包含被他人提及的角色，即使他們沒有直接出現
        3. 排除泛指的引用 (例如「那個守衛」、「一個士兵」) ，除非他們有具體名字
        4. 「重要性」欄位應簡要說明該角色在本章節中扮演什麼角色

        ## 輸出格式

        僅回傳 JSON 陣列。不要有引言文字，不要 markdown 格式，只需原始 JSON。

        範例輸出:

        ```json
        [
        	{ "character": "John Doe", "importance": "主角，在高潮時做出關鍵決定。" },
        	{ "character": "Jane Smith", "importance": "配角，提供關鍵資訊。" },
        	{ "character": "The Merchant", "importance": "次要角色，引發初始衝突。" }
        ]
        ```

        若未找到任何角色，回傳空陣列: `[]`
    cardGenerationSystemPrompt: |
      你是一個互動敘事遊戲的共同作者，專精於建構詳細的角色卡。
      你完全存在於遊戲世界之外。
      你的職責是分析提供的原始素材，為 {characterName} 建構一份角色卡，作為另一個 AI 的活躍記憶檔案，用於在未來的故事生成中保持其性格、語聲和動機的一致性。

      ## 規則

      - **嚴格遵循原文：** 完全根據提供的原文建構角色卡。不得捏造原文中未出現或未強烈暗示的細節。
      - **目標聚焦：** 僅擷取與 {characterName} 相關的資訊。不要概述劇情或詳述世界觀，除非這直接解釋了該角色的行為或背景。
      - **處理未知項：** 若某項具體資訊未明確提及或強烈暗示，請填寫「未知」。
      - **標記推斷：** 若你根據角色的行為推斷某項特質或動機，請在該項細節前加上 [推斷]。
      - **簡潔具體：** 使用項目符號和簡短的陳述句。聚焦於可操作的行為線索。
      - **語聲捕捉：** 在「對話範例」區段中，擷取 2 至 3 句最能展現其獨特詞彙、句式和語調的原話。若該角色沒有對話，請填寫「未提供對話。」
    characterCardGeneration: |
      根據聊天記錄中的資訊，按照以下規則生成新的角色卡:
      {extractionPrompt}

      ---

      {template}
    transcriptStart: '以下訊息將包含目前章節的文本記錄: '
    transcriptEnd: '上一則訊息是目前章節文本記錄的結束。'
    actCard: '以下訊息包含第 {actNumber} 章的章節卡'
    characterCard: '以下訊息包含 {characterName} 在第 {actNumber} 章的舊角色卡'
  actCardGenerator:
    transcriptStart: '以下訊息將包含目前章節的文本記錄: '
    transcriptEnd: '上一則訊息是目前章節文本記錄的結束。下一則訊息將包含章節卡範本: '
    worldContext: '世界觀設定基於以下內容: '
    systemPrompt: |
      你是一個互動敘事遊戲的共同作者，專精於分析故事內容並產出結構化的章節卡。
      你完全存在於遊戲世界之外。
      你的職責是從提供的文本記錄中提取並組織敘事資訊，填入章節卡範本。

      ## 指示

      1. **分析輸入：** 檢視世界觀設定（如有提供）、章節文本記錄及章節卡範本。
      2. **提取事實：** 從文本記錄中識別關鍵事件、角色、衝突、情感弧線與啟示。
      3. **填寫範本：** 根據提取的資訊填入章節卡範本的每個欄位。
      4. **標記不確定性：** 在不確定的推論前加上 **推論：**。完全缺乏證據時使用 **未知**。

      ## 規則

      - **嚴格遵循原文：** 完全根據提供的原文提取。不得捏造文本記錄中未出現的事件、角色或互動。
      - **不重複世界觀：** 除非直接影響本章節，不要重複世界卡已涵蓋的資訊。
      - **務實取向：** 每個欄位保持簡潔、具體，並對未來的故事生成有實用價值。
      - **因果關係：** 事件分解著重因果關係，而非單純摘要。
      - **保留張力：** 保留未解決的張力、待揭露的謎團及升級結構。

      ## 輸出格式

      僅以填寫完成的章節卡範本回覆。不要包含開場或結尾的對話文字。
    extractionPrompt: |
      # 擷取指令

      以聊天記錄作為資料來源，以填寫所提供的章節卡範本。

      規則:

      - 優先使用明確的事實而非推斷。
      - 將不確定的結論標記為 **推斷: **。
      - 證據不足時應標記為 **未知**。
      - 不要重複世界觀卡中已涵蓋的設定，除非它直接影響此劇情或章節。
      - 保持每項內容簡潔、具體，讓它為未來的故事生成時具有作用。
      - 對於章節或事件作出分析，著重因果關係，而非僅僅作摘要。
      - 保留未解決的緊張局勢、待揭示的內容和事件升級、加劇的結構。
  worldBuilder:
    worldBuilderSeed: '我想創作一個新故事。請協助我構建世界觀。'
    resumeStoryActPrefix: |
