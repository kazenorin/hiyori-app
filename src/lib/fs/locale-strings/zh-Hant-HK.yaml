pipeline:
  headers:
    sceneSummaries: 場景摘要
    characterSummaries: 角色摘要
    characterProfiles: 角色檔案
  extraction:
    gameMaster: 根據聊天記錄中的可用資訊，生成遊戲資料。
    gmPhaseEventPhaseAdvancementTrigger: '- **判斷章節階段:** 若你認為故事已完成 {actPhase} 階段，請使用 `advance-phase` 工具精確一次來推進故事。'
    editor: 根據審閱者輸出的建議，修改寫手輸出。請根據聊天記錄中的可用資訊，判斷這些建議是否有必要採納。
    reviewer: '根據聊天記錄中的可用資訊，審閱寫手對場景 {currentScene} 的輸出。'
    reviewerQuick: '快速審閱寫手對場景 {currentScene} 的輸出。僅略讀明顯錯誤——立即輸出審閱範本，不附帶推理過程。'
    writer:
      providedSummary: "\n- 場景 {summarizedScenes} 以前的事件摘要"
      providedTurnOfEvents: "\n- 劇情轉折指令"
      turnOfEventsReinforcementPhrase: "\n你也必須考慮可能使故事轉向不同方向的劇情轉折。"
      providedDirectorNotes: "\n- 導演備註"
      directorNotesReinforcementPhrase: '**重要**: 導演已為即將到來的場景給出指示。你**必須**在撰寫時考慮，並遵循所給的方向或指示。'
    plotPlanner:
      guidance: '目前場景為場景 {currentScene}。請根據聊天記錄中的可用資訊，為緊接的下一場景、近期的情節節奏 (可彈性處理) 以及中期目標 (可彈性處理) 規劃場景劇情。'
      phaseEvent: '目前章節的故事階段為 {currentActPhase}。請根據聊天記錄中的可用資訊，規劃「階段事件」。'
    summarizerFallback: '根據玩家回應，更新場景 {completedScenes} 的章節摘要。'
    summarizer: '更新章節摘要，加入上一個場景的資訊: 「場景 {completedScenes}: {sceneTitle}」'
    editorTemplateFitter: >
      「編輯輸出」未符合所需的範本格式。請根據「寫手輸出範本」中所定義的區段標題重新調整結構，
      插入適當的標題而不更改任何內容。若內容缺少「場景標題」區段，請根據敘事生成一個簡短貼切的標題。
      若缺少其他區段，請加上標題並留空內容。
    gmTemplateFitter: >
      「GM 輸出」未符合所需的遊戲資料格式。請根據遊戲資料範本重新調整結構，
      插入適當的標題而不更改任何內容。若缺少某個區段，請加上標題並留空內容。
  system:
    templateFitter: >
      你是一個範本配適助手。你唯一的任務是將提供的內容重新調整為特定的 Markdown
      範本格式，而不改動任何原始內容。保留每一個字——只加入所需的區段標題。
  labels:
