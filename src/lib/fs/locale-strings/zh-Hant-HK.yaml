    actPlotResumeNote: |
      ---

      ## 重要注意事項

      此章節線從場景 {{sceneNumber}} 重新開始，在場景 {{sceneNumber}} 或之前發生的情節和事件可能有不同的劇情，或是從另一個視角撰寫。
    editorTemplateFitter: >
      「編輯輸出」未符合所需的範本格式。請根據「寫手輸出範本」中所定義的區段標題重新調整結構，
      插入適當的標題而不更改任何內容。若內容缺少「場景標題」區段，請根據敘事生成一個簡短貼切的標題。
      若缺少其他區段，請加上標題並留空內容。
    gmTemplateFitter: >
      「GM 輸出」未符合所需的遊戲資料格式。請根據遊戲資料範本重新調整結構，
      插入適當的標題而不更改任何內容。若缺少某個區段，請加上標題並留空內容。
  system:
    templateFitter: >
      你是一個範本配適助手。你唯一的任務是將提供的內容重新調整為特定的 Markdown
      範本格式，而不改動任何原始內容。保留每一個字——只加入所需的區段標題。
